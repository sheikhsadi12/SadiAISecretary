name: Extract and Build
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract ZIP
        run: unzip SadiAISecretary_GitHub.zip
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK
        run: |
          cd SadiProject
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sadi-APK
          path: SadiProject/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
